<!DOCTYPE html>
<html lang="zh-Hant">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>乘數表無限挑戰</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap');

        body {
            background-color: #f0fdf4;
            font-family: 'Noto Sans TC', sans-serif;
            touch-action: manipulation;
        }

        .ipad-container {
            width: 90vw;
            max-width: 800px;
            margin: auto;
        }

        .glass-card {
            background: white;
            border-radius: 3rem;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.1);
            border: 2px solid #bbf7d0;
        }

        .result-text-giant {
            font-size: 3.5rem;
            line-height: 1.2;
        }

        .result-detail-giant {
            font-size: 2.5rem;
            line-height: 1.4;
        }

        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
    </style>
    <script type="module" src="auth.js"></script>
</head>

<body class="min-h-screen flex flex-col justify-center items-center p-6 relative">
    <a href="index.html"
        class="absolute top-4 left-4 bg-green-600 hover:bg-green-700 text-white font-bold py-2 px-6 rounded-full transition-colors shadow-lg">←
        返回首頁</a>

    <div class="ipad-container">
        <div class="text-center mb-10">
            <div
                class="text-4xl font-bold text-green-700 bg-white py-4 px-10 rounded-full shadow-md inline-block border-2 border-green-200">
                ⏱️ 計時：<span id="timer">0</span> 秒
            </div>
        </div>

        <div id="quiz-box" class="glass-card p-12 text-center">
            <div id="question-area">
                <span class="text-2xl text-gray-400 font-bold mb-6 block tracking-widest">第 <span id="q-num">1</span> /
                    20 題</span>
                <h2 id="question-text" class="text-8xl font-black text-slate-800 mb-12 italic"></h2>

                <div class="flex flex-col items-center gap-10">
                    <input type="number" id="answer-input"
                        class="w-64 text-7xl text-center border-b-8 border-green-400 outline-none p-4 bg-transparent font-bold text-green-600"
                        placeholder="?" autofocus>

                    <button onclick="nextQuestion()"
                        class="w-full py-8 bg-green-500 hover:bg-green-600 text-white rounded-3xl text-4xl font-bold shadow-2xl transform active:scale-95 transition-all">
                        下一題 (NEXT)
                    </button>
                </div>
            </div>

            <div id="result-area" class="hidden text-center py-6">
                <h2 class="font-black text-green-600 mb-8" style="font-size: 5rem;">🎉 完成！</h2>
                <p class="result-text-giant text-slate-700 mb-10">用時：<span id="final-time"
                        class="text-green-500 font-black"></span> 秒</p>
                <div id="detail-results"
                    class="text-left space-y-6 p-8 bg-green-50 rounded-3xl border-2 border-green-100 max-h-[50vh] overflow-y-auto mb-10">
                </div>
                <button onclick="startNewGame()"
                    class="text-3xl text-green-600 font-bold underline decoration-4 underline-offset-8">
                    重新開始挑戰 (新題目)
                </button>
            </div>
        </div>
    </div>

    <script>
        let questions = [];
        let currentIdx = 0;
        let userAnswers = [];
        let startTime;
        let timerInterval;

        window.onUserSet = () => {
             startNewGame();
        };

        async function saveIncorrectAnswers(questions, userAnswers) {
            try {
                const now = new Date();
                const hkt = new Date(now.getTime() + 8 * 60 * 60 * 1000);
                const timestamp = hkt.toISOString().replace('T', ' ').slice(0, 19);
                const promises = [];
                questions.forEach((q, i) => {
                    if (userAnswers[i] !== q.a) {
                        promises.push(window.addDoc(window.collection(window.db, "incorrect-log"), {
                            username: window.getUsername(),
                            question: q.display,
                            correctAnswer: q.a,
                            studentAnswer: userAnswers[i],
                            timestamp: timestamp
                        }));
                    }
                });
                await Promise.all(promises);
            } catch (error) {
                console.error('Error saving incorrect answers:', error);
            }
        }

        async function saveAttendance(totalTime) {
            try {
                const now = new Date();
                const hkt = new Date(now.getTime() + 8 * 60 * 60 * 1000);
                const timestamp = hkt.toISOString().replace('T', ' ').slice(0, 19);
                await window.addDoc(window.collection(window.db, "test-log"), {
                    username: window.getUsername(),
                    test: "乘數表無限挑戰",
                    timespend: Math.floor(totalTime / 60) + "分" + (totalTime % 60) + "秒",
                    timestamp: timestamp
                });
            } catch (error) {
                console.error('Error saving attendance:', error);
            }
        }

        function generateRandomQuestions() {
            const newQuestions = [];
            for (let i = 0; i < 20; i++) {
                const a = Math.floor(Math.random() * 8) + 2; 
                const b = Math.floor(Math.random() * 8) + 2; 
                const format = Math.floor(Math.random() * 3); 

                if (format === 0) {
                    newQuestions.push({ q: `${a} × ${b} = ?`, a: a * b, display: `${a} × ${b} = ?` });
                } else if (format === 1) {
                    newQuestions.push({ q: `${a} × ? = ${a * b}`, a: b, display: `${a} × ? = ${a * b}` });
                } else {
                    newQuestions.push({ q: `? × ${b} = ${a * b}`, a: a, display: `? × ${b} = ${a * b}` });
                }
            }
            return newQuestions;
        }

        function startNewGame() {
            questions = generateRandomQuestions();
            currentIdx = 0;
            userAnswers = [];
            startTime = Date.now();

            document.getElementById('result-area').classList.add('hidden');
            document.getElementById('question-area').classList.remove('hidden');
            document.getElementById('detail-results').innerHTML = '';

            if (timerInterval) clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                document.getElementById('timer').innerText = Math.floor((Date.now() - startTime) / 1000);
            }, 1000);

            showQuestion();
        }

        function showQuestion() {
            const q = questions[currentIdx];
            document.getElementById('q-num').innerText = currentIdx + 1;
            document.getElementById('question-text').innerText = q.display;
            document.getElementById('answer-input').value = '';
            document.getElementById('answer-input').focus();
        }

        function nextQuestion() {
            const val = document.getElementById('answer-input').value;
            if (val === "") return;
            userAnswers.push(parseInt(val));
            if (currentIdx < 19) {
                currentIdx++;
                showQuestion();
            } else {
                finishQuiz();
            }
        }

        function finishQuiz() {
            clearInterval(timerInterval);
            const totalTime = Math.floor((Date.now() - startTime) / 1000);
            document.getElementById('question-area').classList.add('hidden');
            document.getElementById('result-area').classList.remove('hidden');
            document.getElementById('final-time').innerText = totalTime;

            const detailDiv = document.getElementById('detail-results');
            questions.forEach((q, i) => {
                const isCorrect = userAnswers[i] === q.a;
                const div = document.createElement('div');
                div.className = `result-detail-giant font-bold ${isCorrect ? "text-green-600" : "text-red-500"}`;
                div.innerHTML = `第 ${i + 1} 題：${isCorrect ? '✅' : '❌'}<br><span class="text-gray-400 text-2xl">${q.display} (你答:${userAnswers[i]})</span>`;
                detailDiv.appendChild(div);
            });

            saveIncorrectAnswers(questions, userAnswers);
            saveAttendance(totalTime);
        }

        document.getElementById('answer-input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') nextQuestion();
        });

        window.nextQuestion = nextQuestion;
        window.startNewGame = startNewGame;

        if (document.cookie.includes("math_username")) {
            startNewGame();
        }
    </script>
</body>

</html>
