<!DOCTYPE html>
<html lang="zh-Hant">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小學二年級數學無限練習</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: '微軟正黑體', 'Noto Sans TC', sans-serif;
            min-height: 100vh;
        }

        .card-link {
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .card-link:hover {
            transform: translateY(-10px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
        }

        .icon {
            font-size: 80px;
            margin-bottom: 20px;
            transition: transform 0.3s ease;
        }

        .card-link:hover .icon {
            transform: scale(1.1) rotate(5deg);
        }
    </style>
</head>

<body class="min-h-screen flex items-center justify-center p-4">
    <div class="w-full max-w-6xl">
        <!-- Header -->
        <div class="text-center mb-16">
            <h1 class="text-5xl font-bold text-white mb-4">📚 小學二年級數學無限練習</h1>

        </div>

        <!-- Cards Container -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
            <!-- Math 1 -->
            <a href="math3.html" class="card-link">
                <div
                    class="bg-white rounded-3xl p-8 text-center shadow-lg h-full flex flex-col items-center justify-center">
                    <div class="icon">🔢</div>
                    <h2 class="text-2xl font-bold text-gray-800 mb-2">加減乘除應用題</h2>
                    <p class="text-sm text-gray-600">提升計算與邏輯思維</p>
                </div>
            </a>

            <!-- Math 2 -->
            <a href="math2.html" class="card-link">
                <div
                    class="bg-white rounded-3xl p-8 text-center shadow-lg h-full flex flex-col items-center justify-center">

                    <h2 class="text-2xl font-bold text-gray-800 mb-2">連續借位減法挑戰</h2>
                    <p class="text-sm text-gray-600">掌握進階減法技巧</p>
                </div>
            </a>

            <!-- Math 3 -->
            <a href="math1.html" class="card-link">
                <div
                    class="bg-white rounded-3xl p-8 text-center shadow-lg h-full flex flex-col items-center justify-center">
                    <div class="icon">✖️</div>

                    <p class="text-sm text-gray-600">快速記住乘法表</p>

            </a>
        </div>

        <!-- Footer -->
        <div class="text-center mt-16">
            <p class="text-gray-100 text-sm">祝你練習順利！💪</p>
        </div>

        <!-- 練習記錄 Button -->
        <a href="log.html"
           class="fixed bottom-6 right-6 bg-white hover:bg-gray-100 text-indigo-600 font-bold py-3 px-6 rounded-full shadow-lg flex items-center gap-2 transition-all hover:scale-105">
            📊 練習記錄
