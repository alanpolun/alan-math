<!DOCTYPE html>
<html lang="zh-Hant">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>三則運算挑戰</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&display=swap');

        body {
            background-color: #f0f9ff;
            font-family: 'Noto Sans TC', sans-serif;
            touch-action: manipulation;
        }

        .ipad-card {
            background: white;
            border-radius: 2.5rem;
            box-shadow: 0 20px 50px rgba(37, 99, 235, 0.1);
            width: 95vw;
            max-width: 800px;
            margin: 20px auto;
            padding: 2.5rem;
        }

        .giant-text {
            font-size: 4rem;
            font-weight: 800;
            color: #1e40af;
            letter-spacing: -2px;
        }

        input[type=number]::-webkit-inner-spin-button {
            -webkit-appearance: none;
        }
    </style>
    <script type="module" src="auth.js"></script>
</head>

<body class="min-h-screen flex items-center justify-center p-4 relative">
    <a href="index.html"
        class="absolute top-4 left-4 bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-6 rounded-full transition-colors shadow-lg">←
        返回</a>

    <div id="app" class="ipad-card text-center border-4 border-blue-100">
        <div id="setup-view">
            <div class="mb-6">
                <span class="bg-blue-600 text-white px-4 py-1 rounded-full text-sm font-bold tracking-widest">3 TERMS</span>
            </div>
            <h1 class="text-5xl font-black text-blue-900 mb-4">三則運算挑戰</h1>
            <p class="text-blue-700/70 mb-10 text-xl font-medium">隨機 10 題三則運算（加、減混合）</p>
            <button onclick="startQuiz()"
                class="w-full py-8 bg-blue-600 text-white rounded-3xl text-3xl font-bold shadow-xl active:scale-95 transition-all">
                開始練習 (10題)
            </button>
        </div>

        <div id="quiz-view" class="hidden">
            <div class="flex justify-between items-end mb-10 border-b border-blue-100 pb-6">
                <div class="text-left">
                    <p class="text-blue-400 font-bold text-xs uppercase">Progress</p>
                    <p class="text-3xl font-black text-blue-900"><span id="current-num">1</span> <span
                            class="text-blue-200 text-xl">/ 10</span></p>
                </div>
                <div class="text-right">
                    <p id="timer-display" class="text-3xl font-black text-blue-600 font-mono">00分00秒</p>
                </div>
            </div>

            <div id="question-text" class="giant-text mb-12 min-h-[160px] flex items-center justify-center"></div>

            <input type="number" id="answer-input"
                class="w-full text-7xl text-center border-b-8 border-blue-400 outline-none pb-4 text-blue-600 font-black bg-transparent"
                placeholder="?">

            <button onclick="checkAndNext()"
                class="w-full mt-10 py-8 bg-blue-900 text-white rounded-3xl text-4xl font-bold shadow-lg">確認</button>
        </div>

        <div id="result-view" class="hidden text-left">
            <h2 class="text-5xl font-black text-blue-600 mb-6 text-center">挑戰成功！</h2>
            <p id="final-time-text" class="text-center text-xl font-bold text-slate-600 mb-8"></p>
            <div id="results-list" class="space-y-4 max-h-[45vh] overflow-y-auto mb-8 p-6 bg-blue-50 rounded-[2rem]">
            </div>
            <button onclick="location.reload()"
                class="w-full py-6 bg-blue-600 text-white rounded-3xl text-2xl font-bold">重新挑戰</button>
        </div>
    </div>

    
</body>

</html>
