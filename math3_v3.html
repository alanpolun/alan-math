                        "q": "農場裡有 47 個雞蛋，每 5 個裝成一盒，可以裝滿幾盒，還剩幾個雞蛋？",
                        "a": 2,
                        "s": "47 ÷ 5 = 9 ... 2"
            },
            {
                        "q": "農場裡有 13 個雞蛋，每 2 個裝成一盒，可以裝滿幾盒，還剩幾個雞蛋？",
                        "a": 1,
                        "s": "13 ÷ 2 = 6 ... 1"
            },
            {
                        "q": "農場裡有 61 個雞蛋，每 8 個裝成一盒，可以裝滿幾盒，還剩幾個雞蛋？",
                        "a": 5,
                        "s": "61 ÷ 8 = 7 ... 5"
            },
            {
                        "q": "農場裡有 34 個雞蛋，每 4 個裝成一盒，最少需要多少個容器才能裝完所有雞蛋？",
                        "a": 9,
                        "s": "34 ÷ 4 = 8 ... 2 (8 + 1 = 9)"
            },
            {
                        "q": "農場裡有 41 個雞蛋，每 6 個裝成一盒，可以裝滿幾盒，還剩幾個雞蛋？",
                        "a": 5,
                        "s": "41 ÷ 6 = 6 ... 5"
            },
            {
                        "q": "農場裡有 20 個雞蛋，每 3 個裝成一盒，可以裝滿幾盒，還剩幾個雞蛋？",
                        "a": 2,
                        "s": "20 ÷ 3 = 6 ... 2"
            },
            {
                        "q": "農場裡有 50 個雞蛋，每 7 個裝成一盒，最少需要多少個容器才能裝完所有雞蛋？",
                        "a": 8,
                        "s": "50 ÷ 7 = 7 ... 1 (7 + 1 = 8)"
            }
];

        // 題目混淆擴展器 (自動生成 300 題邏輯)
        function getFullPool(base, total) {
            let pool = [];
            while (pool.length < total) { pool = pool.concat(base); }
            return pool.slice(0, total);
        }

        let selectedQuestions = [];
        let currentIdx = 0;
        let userAnswers = [];
        let totalSeconds = 0;
        let isTimerRunning = false;

        function startQuiz() {
            const pMulti = getFullPool(db_multi, 100).sort(() => 0.5 - Math.random()).slice(0, 3);
            const pDiv = getFullPool(db_div, 100).sort(() => 0.5 - Math.random()).slice(0, 3);
            const pRem = getFullPool(db_rem, 100).sort(() => 0.5 - Math.random()).slice(0, 4);

            selectedQuestions = [...pMulti, ...pDiv, ...pRem].sort(() => 0.5 - Math.random());

            currentIdx = 0;
            userAnswers = [];
            totalSeconds = 0;
            document.getElementById('setup-view').classList.add('hidden');
            document.getElementById('quiz-view').classList.remove('hidden');
            startTimer();
            showQuestion();
        }

        function startTimer() {
            isTimerRunning = true;
            const timerInterval = setInterval(() => {
                if (!isTimerRunning) { clearInterval(timerInterval); return; }
                totalSeconds++;
                let m = Math.floor(totalSeconds / 60).toString().padStart(2, '0');
                let s = (totalSeconds % 60).toString().padStart(2, '0');
                document.getElementById('timer-display').innerText = `${m}:${s}`;
            }, 1000);
        }

        function showQuestion() {
            const q = selectedQuestions[currentIdx];
            document.getElementById('current-num').innerText = currentIdx + 1;
            document.getElementById('question-text').innerText = q.q;
            document.getElementById('answer-input').value = '';
            document.getElementById('answer-input').focus();
        }

        function handleAction() {
            const input = document.getElementById('answer-input');
            if (input.value === "") return;
            userAnswers.push(Number(input.value));
            if (currentIdx < 9) {
                currentIdx++;
                showQuestion();
            } else {
                finishQuiz();
            }
        }

        async function saveIncorrectAnswers() {
            try {
                const now = new Date();
                const hkt = new Date(now.getTime() + 8 * 60 * 60 * 1000);
                const timestamp = hkt.toISOString().replace('T', ' ').slice(0, 19);
                const promises = [];
                selectedQuestions.forEach((q, i) => {
                    if (userAnswers[i] !== q.a) {
                        promises.push(window.addDoc(window.collection(window.db, "incorrect-log"), {
                            question: q.q,
                            correctAnswer: q.a,
                            studentAnswer: userAnswers[i],
                            timestamp: timestamp
                        }));
                    }
                });
                await Promise.all(promises);
            } catch (e) {
                console.error('儲存失敗:', e);
            }
        }

        async function saveAttendance(elapsed) {
            try {
                const now = new Date();
                const hkt = new Date(now.getTime() + 8 * 60 * 60 * 1000);
                const timestamp = hkt.toISOString().replace('T', ' ').slice(0, 19);
                await window.addDoc(window.collection(window.db, "test-log"), {
                    test: "300題全能乘除挑戰",
                    timespend: Math.floor(elapsed / 60) + "分" + (elapsed % 60) + "秒",
                    timestamp: timestamp
                });
            } catch (e) {
                console.error('儲存出席失敗:', e);
            }
        }

        function finishQuiz() {
            isTimerRunning = false;
            const elapsed = totalSeconds;
            saveIncorrectAnswers();
            saveAttendance(elapsed);
            document.getElementById('quiz-view').classList.add('hidden');
            document.getElementById('result-view').classList.remove('hidden');
            document.getElementById('final-time').innerText = "總答題耗時：" + document.getElementById('timer-display').innerText;
            const list = document.getElementById('results-list');
            list.innerHTML = "";
            selectedQuestions.forEach((q, i) => {
                const correct = userAnswers[i] === q.a;
                list.innerHTML += `
                    <div class="border-b pb-4 mb-4 text-left">
                        <p class="font-bold text-2xl ${correct ? 'text-green-600' : 'text-red-500'}">
                            ${i + 1}. ${correct ? '✅' : '❌'} ${q.q}
                        </p>
                        <p class="text-xl text-slate-500 mt-2 font-medium">你的答案：${userAnswers[i]} | 正解：${q.a}</p>
                        <p class="text-lg text-indigo-600 mt-1 font-bold italic">💡 解析：${q.s}</p>
                    </div>`;
            });
        }

        document.getElementById('answer-input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') handleAction();
        });
    </script>
