<!DOCTYPE html>
<html lang="zh-Hant">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>連續借位減法</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&display=swap');

        body {
            background-color: #fdf2f8;
            font-family: 'Noto Sans TC', sans-serif;
            touch-action: manipulation;
        }

        .ipad-card {
            background: white;
            border-radius: 2.5rem;
            box-shadow: 0 20px 50px rgba(190, 24, 93, 0.1);
            width: 95vw;
            max-width: 800px;
            margin: 20px auto;
            padding: 2.5rem;
        }

        .giant-text {
            font-size: 4.5rem;
            font-weight: 800;
            color: #9d174d;
            letter-spacing: -2px;
        }

        input[type=number]::-webkit-inner-spin-button {
            -webkit-appearance: none;
        }
    </style>
</head>

<body class="min-h-screen flex items-center justify-center p-4 relative">
    <a href="index.html"
        class="absolute top-4 left-4 bg-pink-600 hover:bg-pink-700 text-white font-bold py-2 px-6 rounded-full transition-colors shadow-lg">←
        返回</a>

    <div id="app" class="ipad-card text-center border-4 border-pink-100">
        <div id="setup-view">
            <div class="mb-6">
                <span class="bg-pink-600 text-white px-4 py-1 rounded-full text-sm font-bold tracking-widest">HARD
                    MODE</span>
            </div>
            <h1 class="text-5xl font-black text-pink-900 mb-4">連續借位大挑戰</h1>
            <p class="text-pink-700/70 mb-10 text-xl font-medium">包含 4 題連環借位 (如 2003 - 767)</p>
            <button onclick="startQuiz()"
                class="w-full py-8 bg-pink-600 text-white rounded-3xl text-3xl font-bold shadow-xl active:scale-95 transition-all">
                開始練習 (10題)
            </button>
        </div>

        <div id="quiz-view" class="hidden">
            <div class="flex justify-between items-end mb-10 border-b border-pink-100 pb-6">
                <div class="text-left">
                    <p class="text-pink-400 font-bold text-xs uppercase">Progress</p>
                    <p class="text-3xl font-black text-pink-900"><span id="current-num">1</span> <span
                            class="text-pink-200 text-xl">/ 10</span></p>
                </div>
                <div class="text-right">
                    <p id="timer-display" class="text-3xl font-black text-pink-600 font-mono">00分00秒</p>
                </div>
            </div>

            <div id="question-text" class="giant-text mb-12 min-h-[160px] flex items-center justify-center"></div>

            <input type="number" id="answer-input"
                class="w-full text-7xl text-center border-b-8 border-pink-400 outline-none pb-4 text-pink-600 font-black bg-transparent"
                placeholder="?">

            <button onclick="checkAndNext()"
                class="w-full mt-10 py-8 bg-pink-900 text-white rounded-3xl text-4xl font-bold shadow-lg">確認</button>
        </div>

        <div id="result-view" class="hidden text-left">
            <h2 class="text-5xl font-black text-pink-600 mb-6 text-center">挑戰成功！</h2>
            <p id="final-time-text" class="text-center text-xl font-bold text-slate-600 mb-8"></p>
            <div id="results-list" class="space-y-4 max-h-[45vh] overflow-y-auto mb-8 p-6 bg-pink-50 rounded-[2rem]">
            </div>
            <button onclick="location.reload()"
                class="w-full py-6 bg-pink-600 text-white rounded-3xl text-2xl font-bold">重新挑戰</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDX-775T11BjNbJ6pyJ8aHfiy1mnieodA4",
            projectId: "p2math-791c8"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let questions = [], currentIdx = 0, userAnswers = [];
        let startTime, timerInterval;

        async function saveIncorrectAnswers(questions, userAnswers) {
            try {
                const now = new Date();
                const hkt = new Date(now.getTime() + 8 * 60 * 60 * 1000);
                const timestamp = hkt.toISOString().replace('T', ' ').slice(0, 19);
                const promises = [];
                questions.forEach((q, i) => {
                    if (userAnswers[i] !== q.a) {
                        promises.push(addDoc(collection(db, "incorrect-log"), {
                            question: q.q,
                            correctAnswer: q.a,
                            studentAnswer: userAnswers[i],
                            timestamp: timestamp
                        }));
                    }
                });
                await Promise.all(promises);
            } catch (e) {
                console.error("Firebase save error:", e);
            }
        }

        async function saveAttendance(totalSeconds) {
            try {
                const now = new Date();
                const hkt = new Date(now.getTime() + 8 * 60 * 60 * 1000);
                const timestamp = hkt.toISOString().replace('T', ' ').slice(0, 19);
                await addDoc(collection(db, "test-log"), {
                    test: "連續借位減法挑戰",
                    timespend: Math.floor(totalSeconds / 60) + "分" + (totalSeconds % 60) + "秒",
                    timestamp: timestamp
                });
            } catch (e) {
                console.error("Firebase save error:", e);
            }
        }

        function generateQuestions() {
            const list = [];
            for (let i = 0; i < 10; i++) {
                let a, b;

                // 其中 4 題 (index 0, 1, 2, 3) 製作「連環借位」
                if (i < 4) {
                    // 隨機生成 100x 或 200x 或 300x 這種中間有 0 的 A
                    const base = Math.floor(Math.random() * 8) + 1; // 1 ~ 8
                    const lastDigit = Math.floor(Math.random() * 9) + 1; // 1 ~ 9
                    a = (base * 1000) + lastDigit; // 生成如 1001~8009

                    // 生成一個 B，其個位數必須大於 A 的個位數，確保觸發借位
                    b = Math.floor(Math.random() * (a - 200)) + 150;
                    // 確保 B 的末幾位比較大，增加借位難度
                    if ((b % 10) <= (a % 10)) b += 5;
                } else {
                    // 普通隨機題
                    a = Math.floor(Math.random() * 9000) + 100;
                    b = Math.floor(Math.random() * (a - 20)) + 11;
                }

                // 最後檢查：B 不可以是個位數，且 A > B
                if (b < 10) b += 10;
                if (b >= a) { a += 1000; }

                list.push({ q: `${a} - ${b} = ?`, a: a - b, s: `${a} - ${b} = ${a - b}` });
            }
            // 打亂題目順序，不要讓前4題永遠是難題
            return list.sort(() => Math.random() - 0.5);
        }

        function startQuiz() {
            questions = generateQuestions();
            document.getElementById('setup-view').classList.add('hidden');
            document.getElementById('quiz-view').classList.remove('hidden');
            startTime = Date.now();
            timerInterval = setInterval(updateTimer, 1000);
            showQuestion();
        }

        function updateTimer() {
            let seconds = Math.floor((Date.now() - startTime) / 1000);
            let m = Math.floor(seconds / 60).toString().padStart(2, '0');
            let s = (seconds % 60).toString().padStart(2, '0');
            document.getElementById('timer-display').innerText = `${m}分${s}秒`;
        }

        function showQuestion() {
            document.getElementById('current-num').innerText = currentIdx + 1;
            document.getElementById('question-text').innerText = questions[currentIdx].q;
            document.getElementById('answer-input').value = '';
            document.getElementById('answer-input').focus();
        }

        function checkAndNext() {
            const input = document.getElementById('answer-input').value;
            if (!input) return;
            userAnswers.push(Number(input));
            if (currentIdx < questions.length - 1) {
                currentIdx++;
                showQuestion();
            } else {
                finishQuiz();
            }
        }

        function finishQuiz() {
            clearInterval(timerInterval);
            document.getElementById('quiz-view').classList.add('hidden');
            document.getElementById('result-view').classList.remove('hidden');
            document.getElementById('final-time-text').innerText = "完成時間：" + document.getElementById('timer-display').innerText;
            const list = document.getElementById('results-list');
            let score = 0;
            questions.forEach((q, i) => {
                const isCorrect = userAnswers[i] === q.a;
                if (isCorrect) score++;
                list.innerHTML += `
                    <div class="flex items-center justify-between p-4 border-b border-pink-100 last:border-0">
                        <span class="text-xl font-bold ${isCorrect ? 'text-green-600' : 'text-red-500'}">
                            ${i + 1}. ${isCorrect ? '✅' : '❌'} ${q.s}
                        </span>
                        <span class="text-slate-500">答案: ${userAnswers[i]}</span>
                    </div>
                `;
            });
            const seconds = Math.floor((Date.now() - startTime) / 1000);
            saveIncorrectAnswers(questions, userAnswers);
            saveAttendance(seconds);
        }

        document.getElementById('answer-input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') checkAndNext();
        });

        // expose for onclick handlers
        window.startQuiz = startQuiz;
        window.checkAndNext = checkAndNext;
    </script>
</body>

</html>
