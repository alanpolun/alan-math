<!DOCTYPE html>
<html lang="zh-Hant">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>基礎退位減法挑戰 - 附演算法解析</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module" src="auth.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap');

        body {
            background-color: #fff1f2;
            font-family: 'Noto Sans TC', sans-serif;
            touch-action: manipulation;
        }

        .ipad-card {
            background: white;
            border-radius: 2.5rem;
            box-shadow: 0 20px 50px rgba(225, 29, 72, 0.1);
            width: 95vw;
            max-width: 800px;
            margin: 20px auto;
            padding: 2.5rem;
        }

        .giant-text {
            font-size: 5rem;
            font-weight: 900;
            color: #be123c;
            letter-spacing: -2px;
        }

        input[type=number]::-webkit-inner-spin-button {
            -webkit-appearance: none;
        }
    </style>
</head>

<body class="min-h-screen flex items-center justify-center p-4 relative">
    <a href="index.html"
        class="absolute top-4 left-4 bg-rose-600 hover:bg-rose-700 text-white font-bold py-2 px-6 rounded-full transition-colors shadow-lg">←
        返回</a>
    
    <div id="app" class="ipad-card text-center border-4 border-rose-100">
        <div id="setup-view">
            <div class="mb-6">
                <span class="bg-rose-600 text-white px-5 py-1.5 rounded-full text-sm font-black tracking-widest">ALGORITHM MODE</span>
            </div>
            <h1 class="text-5xl font-black text-rose-950 mb-4">借位減法特訓</h1>
            <p class="text-rose-700/80 mb-10 text-xl font-bold">專注 11-18 借位思考（附特殊思維解析步驟）</p>
            <button onclick="startQuiz()"
                class="w-full py-8 bg-rose-600 text-white rounded-3xl text-3xl font-bold shadow-xl hover:bg-rose-700 active:scale-95 transition-all">
                開始隨機 10 題測試
            </button>
        </div>

        <div id="quiz-view" class="hidden">
            <div class="flex justify-between items-end mb-10 border-b border-rose-100 pb-6">
                <div class="text-left">
                    <p class="text-rose-400 font-bold text-xs uppercase tracking-wider">Progress</p>
                    <p class="text-3xl font-black text-rose-900"><span id="current-num">1</span> <span class="text-rose-200 text-xl">/ 10</span></p>
                </div>
                <div class="text-right">
                    <p id="timer-display" class="text-3xl font-black text-rose-600 font-mono">00分00秒</p>
                </div>
            </div>

            <div id="question-text" class="giant-text mb-12 min-h-[160px] flex items-center justify-center"></div>

            <input type="number" id="answer-input"
                class="w-full text-7xl text-center border-b-8 border-rose-400 outline-none pb-4 text-rose-600 font-black bg-transparent"
                placeholder="?" autocomplete="off">

            <button onclick="checkAndNext()"
                class="w-full mt-10 py-8 bg-rose-950 text-white rounded-3xl text-4xl font-bold shadow-lg hover:bg-rose-900 transition-colors">確認答案</button>
        </div>

        <div id="result-view" class="hidden text-left">
            <h2 class="text-4xl font-black text-rose-600 mb-2 text-center">測試完成！</h2>
            <p id="final-time-text" class="text-center text-md font-bold text-slate-500 mb-6"></p>
            
            <div class="mb-4 p-4 bg-amber-50 rounded-2xl border border-amber-200 text-amber-900 text-sm">
                <span class="font-black">💡 本次練習思考法：</span> 對於 <span class="font-bold">A - B</span>，先算減數與個位數的差 <span class="font-bold">X = B - (A - 10)</span>，再用 <span class="font-bold">10 - X</span> 導出答案。
            </div>

            <div id="results-list" class="space-y-4 max-h-[45vh] overflow-y-auto mb-8 p-4 bg-slate-50 rounded-[2rem] border border-slate-100">
            </div>
            <button onclick="location.reload()"
                class="w-full py-5 bg-rose-600 text-white rounded-3xl text-2xl font-bold hover:bg-rose-700 transition-colors shadow-lg">換一組題重新挑戰</button>
        </div>
    </div>

    <script>
        let questions = [], currentIdx = 0, userAnswers = [];
        let startTime, timerInterval;

        window.onUserSet = () => {
        };

        async function saveIncorrectAnswers(questions, userAnswers) {
            try {
                const now = new Date();
                const hkt = new Date(now.getTime() + 8 * 60 * 60 * 1000);
                const timestamp = hkt.toISOString().replace('T', ' ').slice(0, 19);
                const promises = [];
                questions.forEach((q, i) => {
                    if (userAnswers[i] !== q.a) {
                        promises.push(window.addDoc(window.collection(window.db, "incorrect-log"), {
                            username: window.getUsername(),
                            question: q.q,
                            correctAnswer: q.a,
                            studentAnswer: userAnswers[i],
                            timestamp: timestamp
                        }));
                    }
                });
                await Promise.all(promises);
            } catch (error) {
                console.error('Error saving incorrect answers:', error);
            }
        }

        async function saveAttendance(totalTime) {
            try {
                const now = new Date();
                const hkt = new Date(now.getTime() + 8 * 60 * 60 * 1000);
                const timestamp = hkt.toISOString().replace('T', ' ').slice(0, 19);
                await window.addDoc(window.collection(window.db, "test-log"), {
                    username: window.getUsername(),
                    test: "借位減法特訓",
                    timespend: Math.floor(totalTime / 60) + "分" + (totalTime % 60) + "秒",
                    timestamp: timestamp
                });
            } catch (error) {
                console.error('Error saving attendance:', error);
            }
        }

        function generateQuestions() {
            const pool = [];
            
            // 嚴格篩選 A (11-18) 與 B (<=9) 且必須借位的組合
            for (let a = 11; a <= 18; a++) {
                let lastDigit = a - 10; // A的個位數 (A-10)
                
                for (let b = 1; b <= 9; b++) {
                    // 借位限制條件：個位數不夠減 (lastDigit < b)
                    if (lastDigit < b) {
                        let x = b - lastDigit;  // 演算法核心步驟 1
                        let ans = 10 - x;       // 演算法核心步驟 2
                        
                        pool.push({
                            a_val: a,
                            b_val: b,
                            q: `${a} - ${b} = ?`,
                            a: ans,
                            // 格式化輸出您要求的解題步驟
                            sol: `${b} - ${lastDigit} = ${x}， 10 - ${x} = ${ans}`
                        });
                    }
                }
            }
            // 隨機打亂並抽出 10 題
            return pool.sort(() => Math.random() - 0.5).slice(0, 10);
        }

        function startQuiz() {
            questions = generateQuestions();
            document.getElementById('setup-view').classList.add('hidden');
            document.getElementById('quiz-view').classList.remove('hidden');
            startTime = Date.now();
            timerInterval = setInterval(updateTimer, 1000);
            showQuestion();
        }

        function updateTimer() {
            let seconds = Math.floor((Date.now() - startTime) / 1000);
            let m = Math.floor(seconds / 60).toString().padStart(2, '0');
            let s = (seconds % 60).toString().padStart(2, '0');
            document.getElementById('timer-display').innerText = `${m}分${s}秒`;
        }

        function showQuestion() {
            document.getElementById('current-num').innerText = currentIdx + 1;
            document.getElementById('question-text').innerText = questions[currentIdx].q;
            document.getElementById('answer-input').value = '';
            document.getElementById('answer-input').focus();
        }

        function checkAndNext() {
            const input = document.getElementById('answer-input').value;
            if (!input) return;
            
            userAnswers.push(Number(input));
            if (currentIdx < questions.length - 1) {
                currentIdx++;
                showQuestion();
            } else {
                finishQuiz();
            }
        }

        function finishQuiz() {
            clearInterval(timerInterval);
            const totalTime = Math.floor((Date.now() - startTime) / 1000);
            document.getElementById('quiz-view').classList.add('hidden');
            document.getElementById('result-view').classList.remove('hidden');
            document.getElementById('final-time-text').innerText = "總答題耗時：" + document.getElementById('timer-display').innerText;
            
            const list = document.getElementById('results-list');
            list.innerHTML = ""; // 清空舊內容
            
            questions.forEach((q, i) => {
                const isCorrect = userAnswers[i] === q.a;
                list.innerHTML += `
                    <div class="p-4 rounded-2xl bg-white border border-slate-100 shadow-sm mb-3">
                        <div class="flex items-center justify-between border-b border-slate-50 pb-2 mb-2">
                            <span class="text-xl font-black ${isCorrect ? 'text-green-600' : 'text-red-500'}">
                                ${i + 1}. ${isCorrect ? '✅ 正確' : '❌ 錯誤'} &nbsp;&nbsp;${q.a_val} - ${q.b_val} = ${q.a}
                            </span>
                            <span class="text-slate-500 text-sm font-bold">孩子輸入: <span class="${isCorrect ? 'text-green-600' : 'text-red-500'}">${userAnswers[i]}</span></span>
                        </div>
                        <div class="text-indigo-600 font-mono text-sm font-bold bg-indigo-50/50 p-2.5 rounded-xl">
                            💡 解題思路：${q.sol}
                        </div>
                    </div>
                `;
            });
            saveIncorrectAnswers(questions, userAnswers);
            saveAttendance(totalTime);
        }

        // 支援鍵盤 Enter 快速送出
        document.getElementById('answer-input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') checkAndNext();
        });
    </script>
</body>

</html>
