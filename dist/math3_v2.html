        let questions = [];
        let currentIdx = 0;
        let score = 0;
        let userAnswers = [];
        let startTime, timerInterval;

        function startQuiz() {
            try {
                // 隨機選 10 題
                questions = questionDb.sort(() => 0.5 - Math.random()).slice(0, 10);

                document.getElementById('start-screen').classList.add('hidden');
                document.getElementById('quiz-screen').classList.remove('hidden');

                startTimer();
                showQuestion();
            } catch (e) {
                alert('無法載入題庫。');
            }
        }

        function startTimer() {
            startTime = Date.now();
            timerInterval = setInterval(() => {
                let diff = Math.floor((Date.now() - startTime) / 1000);
                let m = Math.floor(diff / 60).toString().padStart(2, '0');
                let s = (diff % 60).toString().padStart(2, '0');
                document.getElementById('timer').innerText = `${m}:${s}`;
            }, 1000);
        }

        function showQuestion() {
            document.getElementById('current-idx').innerText = currentIdx + 1;
            document.getElementById('question-text').innerText = questions[currentIdx].q;
            document.getElementById('answer-input').value = '';
            document.getElementById('answer-input').focus();
        }

        function nextQuestion() {
            const input = document.getElementById('answer-input');
            if (input.value === "") return alert("請輸入答案");

            userAnswers.push(Number(input.value));

            if (currentIdx < 9) {
                currentIdx++;
                showQuestion();
            } else {
                finishQuiz();
            }
        }

        async function saveIncorrectAnswers() {
            try {
                const now = new Date();
                const hkt = new Date(now.getTime() + 8 * 60 * 60 * 1000);
                const timestamp = hkt.toISOString().replace('T', ' ').slice(0, 19);
                const username = window.getUsername();
                const promises = [];
                questions.forEach((q, i) => {
                    if (userAnswers[i] !== q.a) {
                        promises.push(window.addDoc(window.collection(window.db, "incorrect-log"), {
                            username: username,
                            question: q.q,
                            correctAnswer: q.a,
                            studentAnswer: userAnswers[i],
                            timestamp: timestamp
                        }));
                    }
                });
                await Promise.all(promises);
            } catch (e) {
                console.error('儲存失敗:', e);
            }
        }

        function finishQuiz() {
            clearInterval(timerInterval);
            document.getElementById('quiz-screen').classList.add('hidden');
            document.getElementById('result-screen').classList.remove('hidden');
            document.getElementById('total-time').innerText = "總耗時: " + document.getElementById('timer').innerText;

            const list = document.getElementById('result-list');
            questions.forEach((q, i) => {
                const isCorrect = userAnswers[i] === q.a;
                if (isCorrect) score++;
                const item = document.createElement('div');
                item.className = `p-4 border-l-8 rounded shadow-sm ${isCorrect ? 'border-green-500 bg-green-50' : 'border-red-500 bg-red-50'}`;
                item.innerHTML = `
                    <p class="font-bold">${i + 1}. ${isCorrect ? '✅' : '❌'} ${q.q}</p>
                    <p class="text-sm mt-2 text-gray-600">你的答案: ${userAnswers[i]} | 正確答案: ${q.a}</p>
                    <p class="text-sm font-bold text-blue-600">詳解: ${q.s}</p>
                `;
                list.appendChild(item);
            });

            saveIncorrectAnswers();
            const elapsed = Math.floor((Date.now() - startTime) / 1000);
            saveAttendance(elapsed);
        }

        async function saveAttendance(elapsed) {
            try {
                const now = new Date();
                const hkt = new Date(now.getTime() + 8 * 60 * 60 * 1000);
                const timestamp = hkt.toISOString().replace('T', ' ').slice(0, 19);
                const username = window.getUsername();
                await window.addDoc(window.collection(window.db, "test-log"), {
                    username: username,
                    test: "加減乘除應用題",
                    timespend: Math.floor(elapsed / 60) + "分" + (elapsed % 60) + "秒",
                    timestamp: timestamp
                });
            } catch (e) {
                console.error('儲存出席失敗:', e);
            }
        }

        // support Enter
        document.getElementById('answer-input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') nextQuestion();
        });

        // expose for onclick handlers
        window.startQuiz = startQuiz;
        window.nextQuestion = nextQuestion;
