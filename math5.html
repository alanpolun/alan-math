<!DOCTYPE html>
<html lang="zh-Hant">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>基礎退位減法挑戰</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap');

        body {
            background-color: #fff1f2;
            font-family: 'Noto Sans TC', sans-serif;
            touch-action: manipulation;
        }

        .ipad-card {
            background: white;
            border-radius: 2.5rem;
            box-shadow: 0 20px 50px rgba(225, 29, 72, 0.1);
            width: 95vw;
            max-width: 800px;
            margin: 20px auto;
            padding: 2.5rem;
        }

        .giant-text {
            font-size: 5rem;
            font-weight: 900;
            color: #be123c;
            letter-spacing: -2px;
        }

        input[type=number]::-webkit-inner-spin-button {
            -webkit-appearance: none;
        }
    </style>
</head>

<body class="min-h-screen flex items-center justify-center p-4 relative">
    
    <div id="app" class="ipad-card text-center border-4 border-rose-100">
        <div id="setup-view">
            <div class="mb-6">
                <span class="bg-rose-600 text-white px-5 py-1.5 rounded-full text-sm font-black tracking-widest">BASIC MODE</span>
            </div>
            <h1 class="text-5xl font-black text-rose-950 mb-4">20以內退位減法</h1>
            <p class="text-rose-700/80 mb-10 text-xl font-bold">專注於 11-18 的基礎借位減數練習 (10題)</p>
            <button onclick="startQuiz()"
                class="w-full py-8 bg-rose-600 text-white rounded-3xl text-3xl font-bold shadow-xl hover:bg-rose-700 active:scale-95 transition-all">
                開始練習
            </button>
        </div>

        <div id="quiz-view" class="hidden">
            <div class="flex justify-between items-end mb-10 border-b border-rose-100 pb-6">
                <div class="text-left">
                    <p class="text-rose-400 font-bold text-xs uppercase tracking-wider">Progress</p>
                    <p class="text-3xl font-black text-rose-900"><span id="current-num">1</span> <span class="text-rose-200 text-xl">/ 10</span></p>
                </div>
                <div class="text-right">
                    <p id="timer-display" class="text-3xl font-black text-rose-600 font-mono">00分00秒</p>
                </div>
            </div>

            <div id="question-text" class="giant-text mb-12 min-h-[160px] flex items-center justify-center"></div>

            <input type="number" id="answer-input"
                class="w-full text-7xl text-center border-b-8 border-rose-400 outline-none pb-4 text-rose-600 font-black bg-transparent"
                placeholder="?" autocomplete="off">

            <button onclick="checkAndNext()"
                class="w-full mt-10 py-8 bg-rose-950 text-white rounded-3xl text-4xl font-bold shadow-lg hover:bg-rose-900 transition-colors">確認</button>
        </div>

        <div id="result-view" class="hidden text-left">
            <h2 class="text-5xl font-black text-rose-600 mb-6 text-center">挑戰成功！</h2>
            <p id="final-time-text" class="text-center text-xl font-bold text-slate-600 mb-8"></p>
            <div id="results-list" class="space-y-4 max-h-[45vh] overflow-y-auto mb-8 p-6 bg-rose-50 rounded-[2rem]">
            </div>
            <button onclick="location.reload()"
                class="w-full py-6 bg-rose-600 text-white rounded-3xl text-2xl font-bold hover:bg-rose-700 transition-colors">重新挑戰</button>
        </div>
    </div>

    <script>
        let questions = [], currentIdx = 0, userAnswers = [];
        let startTime, timerInterval;

        // 核心智慧生成邏輯：完全符合 A - B 且必須借位之限制
        function generateBorrowQuestions() {
            const pool = [];
            
            // 窮舉所有符合條件的 A (11-18) 與 B (<=9)
            for (let a = 11; a <= 18; a++) {
                let aLastDigit = a % 10; // A的個位數
                
                for (let b = 1; b <= 9; b++) {
                    // 借位條件：A的個位數必須小於B (例如 13-5 中 3 < 5)
                    if (aLastDigit < b) {
                        let s = a - b;
                        pool.push({
                            q: `${a} - ${b} = ?`,
                            a: s,
                            display: `${a} - ${b} = ${s}`
                        });
                    }
                }
            }
            
            // 從完美符合條件的題池中隨機抽取10題
            return pool.sort(() => Math.random() - 0.5).slice(0, 10);
        }

        function startQuiz() {
            questions = generateBorrowQuestions();
            document.getElementById('setup-view').classList.add('hidden');
            document.getElementById('quiz-view').classList.remove('hidden');
            startTime = Date.now();
            timerInterval = setInterval(updateTimer, 1000);
            showQuestion();
        }

        function updateTimer() {
            let seconds = Math.floor((Date.now() - startTime) / 1000);
            let m = Math.floor(seconds / 60).toString().padStart(2, '0');
            let s = (seconds % 60).toString().padStart(2, '0');
            document.getElementById('timer-display').innerText = `${m}分${s}秒`;
        }

        function showQuestion() {
            document.getElementById('current-num').innerText = currentIdx + 1;
            document.getElementById('question-text').innerText = questions[currentIdx].q;
            document.getElementById('answer-input').value = '';
            document.getElementById('answer-input').focus();
        }

        function checkAndNext() {
            const input = document.getElementById('answer-input').value;
            if (!input) return;
            
            userAnswers.push(Number(input));
            if (currentIdx < questions.length - 1) {
                currentIdx++;
                showQuestion();
            } else {
                finishQuiz();
            }
        }

        function finishQuiz() {
            clearInterval(timerInterval);
            document.getElementById('quiz-view').classList.add('hidden');
            document.getElementById('result-view').classList.remove('hidden');
            document.getElementById('final-time-text').innerText = "完成時間：" + document.getElementById('timer-display').innerText;
            
            const list = document.getElementById('results-list');
            questions.forEach((q, i) => {
                const isCorrect = userAnswers[i] === q.a;
                list.innerHTML += `
                    <div class="flex items-center justify-between p-4 border-b border-rose-100 last:border-0">
                        <span class="text-xl font-bold ${isCorrect ? 'text-green-600' : 'text-red-500'}">
                            ${i + 1}. ${isCorrect ? '✅' : '❌'} ${q.display}
                        </span>
                        <span class="text-slate-500 font-bold text-xl">孩子答案: ${userAnswers[i]}</span>
                    </div>
                `;
            });
        }

        // 支援 Enter 鍵快速送出答案
        document.getElementById('answer-input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') checkAndNext();
        });

        window.startQuiz = startQuiz;
        window.checkAndNext = checkAndNext;
    </script>
</body>

</html>
